ydlidar_ros2_driver_node:
  ros__parameters:
    port: /dev/ttyUSB0
    frame_id: lidar_link
    ignore_array: ""
    baudrate: 115200
    lidar_type: 1
    device_type: 0
    isSingleChannel: true
    intensity: true
    intensity_bit: 8
    sample_rate: 4
    abnormal_check_count: 4
    fixed_resolution: false
    reversion: true
    inverted: true
    auto_reconnect: true
    support_motor_dtr: false
    angle_max: 180.0
    angle_min: -180.0
    range_max: 64.0
    range_min: 0.01
    frequency: 10.0
    invalid_range_is_inf: false
    debug: false
